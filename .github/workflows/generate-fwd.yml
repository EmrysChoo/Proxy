name: Generate FWD

on:
  push:
    branches:
      - main
  workflow_dispatch:   # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run generateFwd.js
        run: node Forward/generateFwd.js

      - name: Debug Forward directory
        run: ls -R Forward || echo "Forward 目录不存在"

      - name: Show forward.fwd content
        run: cat Forward/forward.fwd || echo "forward.fwd 未生成"

      - name: Commit and push forward.fwd (force add)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A Forward/forward.fwd
          git commit -m "chore: add/update forward.fwd" || echo "⚠️ 没有变化，跳过 commit"
          git push origin HEAD:main
