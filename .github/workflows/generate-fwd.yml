name: Generate FWD

on:
  push:
    branches:
      - main   # 只要 push 到 main 分支就运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generate forward.fwd
        run: node Proxy/Forward/generateFwd.js

      - name: Commit and push updated forward.fwd
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Proxy/Forward/forward.fwd
          git commit -m "chore: auto-update forward.fwd" || echo "No changes to commit"
          git push
